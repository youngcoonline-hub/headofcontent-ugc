<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward — Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0F;--sf:#13131A;--sf2:#1A1A24;--sf3:#21212E;
  --bd:#252535;--bd2:#2E2E42;
  --ac:#7B6EF6;--acd:rgba(123,110,246,.15);
  --a2:#4ECDC4;--a2d:rgba(78,205,196,.12);
  --a3:#F7B731;--a3d:rgba(247,183,49,.12);
  --dg:#FF6B6B;--dgd:rgba(255,107,107,.12);
  --gn:#51CF66;--gnd:rgba(81,207,102,.12);
  --pk:#F06595;--pkd:rgba(240,101,149,.12);
  --or:#FF8C42;
  --tx:#F2F2FA;--t2:#A0A0C0;--t3:#5A5A7A;
  --mn:'DM Mono',monospace;--sn:'Syne',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:var(--sn);display:flex;flex-direction:column;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;gap:14px;}
.logo{font-size:14px;font-weight:800;letter-spacing:-.03em;}
.logo s{color:var(--ac);text-decoration:none;}
.hdr-c{display:flex;align-items:center;gap:5px;flex:1;justify-content:center;}
.pip{height:3px;width:22px;border-radius:2px;background:var(--bd2);transition:all .3s;}
.pip.done{background:var(--a2);}
.pip.active{background:var(--ac);}
.mbadge{font-family:var(--mn);font-size:9px;padding:3px 9px;border-radius:20px;border:1px solid var(--bd);}
.m-ugc{background:var(--acd);color:var(--ac);border-color:rgba(123,110,246,.3);}
.m-st{background:var(--pkd);color:var(--pk);border-color:rgba(240,101,149,.3);}
.m-bo{background:var(--a2d);color:var(--a2);border-color:rgba(78,205,196,.3);}

/* LAYOUT */
.lay{display:grid;grid-template-columns:210px 1fr 240px;flex:1;overflow:hidden;min-height:0;}

/* SIDEBAR */
.sb{border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;overflow-y:auto;}
.sbs{padding:13px 11px 5px;}
.sbl{font-family:var(--mn);font-size:9px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
.fi{display:flex;align-items:flex-start;gap:7px;padding:6px 7px;border-radius:7px;margin-bottom:2px;border:1px solid transparent;transition:all .15s;}
.fi.cur{background:var(--acd);border-color:rgba(123,110,246,.25);}
.fi.don{opacity:.4;}
.fi.pen{opacity:.2;}
.fic{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.ip{background:var(--acd);color:var(--ac);}
.it{background:var(--a2d);color:var(--a2);}
.ia{background:var(--a3d);color:var(--a3);}
.ir{background:var(--dgd);color:var(--dg);}
.ipk{background:var(--pkd);color:var(--pk);}
.fit{font-size:10.5px;font-weight:600;color:var(--tx);line-height:1.3;}
.fiw{font-family:var(--mn);font-size:8px;color:var(--t3);}
.fick{font-size:10px;color:var(--a2);margin-left:auto;}
.sbdiv{height:1px;background:var(--bd);margin:5px 11px;}
.cb{padding:9px 11px;}
.cbl{font-family:var(--mn);font-size:9px;color:var(--t3);margin-bottom:3px;}
.cbv{font-size:10.5px;color:var(--t2);line-height:1.7;}
.cbv strong{color:var(--a2);font-weight:600;}

/* CHAT */
.chat{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth;}
.msg{display:flex;gap:7px;align-items:flex-start;animation:fu .2s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.av{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--mn);flex-shrink:0;}
.av-bot{background:linear-gradient(135deg,var(--ac),var(--a2));color:#fff;}
.av-ej{background:var(--a3d);color:var(--a3);border:1px solid rgba(247,183,49,.2);}
.av-hoc{background:var(--a2d);color:var(--a2);border:1px solid rgba(78,205,196,.2);}
.av-ed{background:var(--dgd);color:var(--dg);border:1px solid rgba(255,107,107,.15);}
.av-ds{background:var(--pkd);color:var(--pk);border:1px solid rgba(240,101,149,.15);}
.mb{flex:1;min-width:0;}
.mm{display:flex;align-items:baseline;gap:5px;margin-bottom:2px;}
.mn2{font-size:10.5px;font-weight:700;}
.mt{font-family:var(--mn);font-size:7px;padding:1px 4px;border-radius:3px;}
.t-bot{background:var(--acd);color:var(--ac);}
.t-ej{background:var(--a3d);color:var(--a3);}
.t-hoc{background:var(--a2d);color:var(--a2);}
.t-ed{background:var(--dgd);color:var(--dg);}
.t-ds{background:var(--pkd);color:var(--pk);}
.mtime{font-family:var(--mn);font-size:7px;color:var(--t3);}
.mtxt{font-size:11.5px;line-height:1.75;color:var(--t2);}
.mtxt strong{color:var(--tx);font-weight:600;}
.mtxt em{color:var(--a2);font-style:normal;}
.mtxt code{font-family:var(--mn);font-size:9px;background:var(--sf2);border:1px solid var(--bd);padding:1px 4px;border-radius:3px;color:var(--ac);}
.typing{display:inline-flex;gap:3px;align-items:center;padding:2px 0;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--t3);animation:bl 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-top:6px;}
.cardh{font-family:var(--mn);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;}
.fr{display:flex;gap:5px;margin-bottom:5px;align-items:flex-start;}
.fr:last-child{margin-bottom:0;}
.fl{font-size:9.5px;color:var(--t3);min-width:80px;padding-top:1px;}
.fv{font-size:10.5px;color:var(--tx);flex:1;line-height:1.5;}

/* SCENES */
.sw{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-top:6px;overflow:hidden;}
.sth{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;border-bottom:1px solid var(--bd);background:var(--sf2);}
.sttl{font-family:var(--mn);font-size:8px;color:var(--ac);}
.smeta{font-family:var(--mn);font-size:7px;color:var(--t3);}
.sbdy{padding:10px 12px;}
.scene{display:grid;grid-template-columns:13px 1fr auto;gap:3px 7px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--bd);align-items:start;}
.scene:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.scn{font-family:var(--mn);font-size:8px;color:var(--t3);padding-top:2px;text-align:right;}
.sco{font-size:11px;color:var(--tx);line-height:1.6;font-style:italic;}
.sco[contenteditable="true"]{background:var(--sf2);border:1px solid var(--a3);border-radius:4px;padding:3px 6px;outline:none;font-style:normal;cursor:text;}
.scd{font-size:9.5px;color:var(--t3);margin-top:2px;}
.scd span{color:var(--a3);}
.scd[contenteditable="true"]{background:var(--sf2);border:1px solid var(--bd2);border-radius:3px;padding:2px 5px;outline:none;}
.sedb{width:18px;height:18px;border-radius:3px;background:var(--sf2);border:1px solid var(--bd);color:var(--t3);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;}
.sedb:hover{border-color:var(--a3);color:var(--a3);}
.sedb.active{background:var(--a3d);border-color:var(--a3);color:var(--a3);}

/* VARIANTES UGC */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px;}
.vc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:all .15s;position:relative;}
.vc:hover{border-color:var(--bd2);background:var(--sf2);}
.vc.vdone{border-color:var(--gn);background:var(--gnd);}
.vc.vgen{border-color:var(--a3);opacity:.7;pointer-events:none;}
.vlbl{font-family:var(--mn);font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.vhk{font-size:10.5px;color:var(--tx);line-height:1.5;font-style:italic;}
.vfnd{font-size:9px;color:var(--a2);margin-top:3px;font-family:var(--mn);}
.vbdg{position:absolute;top:6px;right:6px;font-family:var(--mn);font-size:7px;padding:2px 5px;border-radius:3px;}

/* STATIC 4 OPTIONS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;}
.so{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:9px 11px;cursor:pointer;transition:all .15s;position:relative;user-select:none;-webkit-user-select:none;}
.so:hover{border-color:var(--bd2);background:var(--sf2);}
.so.sel{border-color:var(--pk);background:var(--pkd);}
.solbl{font-family:var(--mn);font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;justify-content:space-between;}
.soang{color:var(--pk);}
.sohl{font-size:11.5px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.socp{font-size:10px;color:var(--t2);line-height:1.5;margin-bottom:3px;}
.soim{font-size:9px;color:var(--t3);font-family:var(--mn);}
.so-actions{display:flex;gap:3px;margin-top:7px;padding-top:6px;border-top:1px solid var(--bd);}
.so-edit-panel{display:none;margin-top:7px;padding-top:7px;border-top:1px solid var(--bd);}
.so-edit-panel input,.so-edit-panel textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:10px;padding:4px 7px;border-radius:4px;outline:none;font-family:var(--sans);margin-bottom:3px;}
.so-edit-panel label{font-family:var(--mn);font-size:7px;color:var(--t3);display:block;margin-bottom:1px;}
.so-regen-panel{display:none;margin-top:7px;padding-top:7px;border-top:1px solid var(--bd);}
.so-regen-panel textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:10px;padding:4px 7px;border-radius:4px;outline:none;resize:none;font-family:var(--sans);}
.sobdg{position:absolute;top:6px;right:6px;font-family:var(--mn);font-size:7px;background:var(--pk);color:#fff;padding:2px 4px;border-radius:3px;pointer-events:none;}

/* CORRECCIÓN */
.corrbox{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);margin-top:6px;overflow:hidden;}
.cbtop{padding:7px 11px;border-bottom:1px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:space-between;}
.cbtlbl{font-family:var(--mn);font-size:8px;color:var(--a3);}
.cbbdy{padding:9px 11px;display:flex;flex-direction:column;gap:6px;}
.cbtxt{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--sn);font-size:10.5px;padding:6px 8px;border-radius:5px;outline:none;resize:none;width:100%;transition:border .15s;line-height:1.6;}
.cbtxt:focus{border-color:var(--a3);}
.cbact{display:flex;gap:5px;justify-content:flex-end;}

/* DESGLOSE */
.dw{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-top:6px;overflow:hidden;}
.dtop{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;border-bottom:1px solid var(--bd);background:var(--sf2);}
.dttl{font-family:var(--mn);font-size:8px;color:var(--a2);}
.dr{display:grid;grid-template-columns:16px 1fr 78px 52px;border-bottom:1px solid var(--bd);}
.dr:last-child{border-bottom:none;}
.dr.dh{background:var(--sf2);font-family:var(--mn);font-size:7px;color:var(--t3);}
.dc{padding:6px 9px;font-size:10px;color:var(--t2);border-right:1px solid var(--bd);}
.dc:last-child{border-right:none;}
.dc.vid{color:var(--ac);font-family:var(--mn);font-size:8px;}

/* BOTONES */
.abar{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.btn{padding:4px 11px;border-radius:5px;font-family:var(--sn);font-size:10.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:3px;}
.btn:disabled{opacity:.25;cursor:not-allowed;}
.bok{background:var(--gnd);color:var(--gn);border:1px solid rgba(81,207,102,.25);}
.bok:hover:not(:disabled){background:rgba(81,207,102,.2);}
.brev{background:var(--a3d);color:var(--a3);border:1px solid rgba(247,183,49,.2);}
.brev:hover:not(:disabled){background:rgba(247,183,49,.18);}
.bpr{background:var(--ac);color:#fff;}
.bpr:hover:not(:disabled){background:#6B5EE8;}
.bgh{background:var(--sf2);color:var(--t2);border:1px solid var(--bd);}
.bgh:hover:not(:disabled){background:var(--sf3);color:var(--tx);}
.bdl{background:var(--gnd);color:var(--gn);border:1px solid rgba(81,207,102,.25);}
.bdl:hover:not(:disabled){background:rgba(81,207,102,.2);}
.bpk{background:var(--pkd);color:var(--pk);border:1px solid rgba(240,101,149,.2);}
.bpk:hover:not(:disabled){background:rgba(240,101,149,.18);}

/* MODE SELECTOR */
.msel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px 14px;}
.msel-t{font-size:12.5px;font-weight:600;color:var(--t2);text-align:center;}
.mbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.mbtn{padding:13px 9px;border-radius:var(--r);background:var(--sf);border:1px solid var(--bd);cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;gap:4px;align-items:center;}
.mbtn:hover{border-color:var(--bd2);background:var(--sf2);}
.mb-ugc:hover{border-color:var(--ac);background:var(--acd);}
.mb-st:hover{border-color:var(--pk);background:var(--pkd);}
.mb-bo:hover{border-color:var(--a2);background:var(--a2d);}
.mic{font-size:17px;}
.mlbl{font-size:11px;font-weight:600;color:var(--tx);}
.msub{font-family:var(--mn);font-size:8px;color:var(--t3);}

/* INPUT ZONE */
.iz{padding:9px 18px 13px;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;}
.izlbl{font-family:var(--mn);font-size:8px;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.izlbl::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--ac);animation:pu 2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.bf{display:flex;flex-direction:column;gap:5px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.ff{display:flex;flex-direction:column;gap:2px;}
.ff label{font-family:var(--mn);font-size:7px;color:var(--t3);}
.ff input,.ff select,.ff textarea{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--sn);font-size:10.5px;padding:4px 7px;border-radius:5px;outline:none;transition:border .15s;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--ac);}
.ff textarea{resize:none;line-height:1.5;}
.ff select option{background:var(--sf2);}
.sr{display:flex;justify-content:flex-end;gap:5px;margin-top:2px;}
.wlbl{font-family:var(--mn);font-size:8px;color:var(--t3);display:flex;align-items:center;gap:4px;padding:3px 0;}

/* IMG UPLOAD */
.iup{border:1px dashed var(--bd2);border-radius:6px;padding:7px 10px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sf2);}
.iup:hover,.iup.has{border-color:var(--a2);background:var(--a2d);}
.ipv{width:100%;max-height:45px;object-fit:cover;border-radius:3px;margin-top:3px;}

/* LINKS */
.lchip{display:inline-flex;align-items:center;gap:3px;background:var(--a2d);border:1px solid rgba(78,205,196,.2);color:var(--a2);font-family:var(--mn);font-size:8px;padding:2px 6px;border-radius:3px;margin-top:3px;cursor:pointer;text-decoration:none;}
.errb{background:var(--dgd);border:1px solid rgba(255,107,107,.25);color:var(--dg);font-family:var(--mn);font-size:9px;padding:5px 9px;border-radius:5px;margin-top:5px;}

/* RIGHT PANEL */
.rp{border-left:1px solid var(--bd);background:var(--sf);overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:11px;}
.rpl{font-family:var(--mn);font-size:8px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.stc{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:9px;}
.str{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.str:last-child{margin-bottom:0;}
.stk{font-size:9.5px;color:var(--t3);}
.stv{font-size:9.5px;font-weight:600;}
.svp{color:var(--t3);}
.sva{color:var(--a3);}
.svd{color:var(--gn);}
.svw{color:var(--ac);}
.chi{display:flex;align-items:flex-start;gap:5px;padding:4px 0;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;}
.chi:last-child{border-bottom:none;}
.chb{width:12px;height:12px;border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;}
.chok{background:var(--gnd);color:var(--gn);border:1px solid rgba(81,207,102,.25);}
.chwt{background:var(--sf2);color:var(--t3);border:1px solid var(--bd);}
.chtxt{font-size:10px;color:var(--t2);line-height:1.4;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Forward<s>.</s> <span style="font-size:9px;font-weight:400;color:var(--t3);font-family:var(--mn)">Content Studio</span></div>
  <div class="hdr-c" id="pips"></div>
  <div id="mbadge" style="display:none"></div>
</div>
<div class="lay">
  <div class="sb">
    <div class="sbs"><div class="sbl">Flujo</div><div id="flow"></div></div>
    <div class="sbdiv"></div>
    <div class="cb" id="cbox"><div class="cbl">Proyecto activo</div><div class="cbv" style="color:var(--t3);font-style:italic;font-size:9.5px">Sin brief cargado</div></div>
    <div class="sbdiv"></div>
    <div class="cb" id="aprbox" style="display:none"><div class="cbl">Aprobados</div><div id="aprlist"></div></div>
  </div>
  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="iz" id="iz"></div>
  </div>
  <div class="rp">
    <div><div class="rpl">Estado</div><div class="stc" id="stc"></div></div>
    <div><div class="rpl">Checklist editor</div><div id="chk"></div></div>
  </div>
</div>
<script>
const PROXY='/api/anthropic-proxy', MODEL='claude-sonnet-4-5';
let S={mode:null,ph:0,brief:null,img:null,gb:null,ga:[],so:null,ss:[],sa:[],lm:null,lk:null,cv:null,chk:{}};

const AUG=[{k:'emocional',l:'Emocional',c:'var(--pk)'},{k:'practicidad',l:'Practicidad',c:'var(--a2)'},{k:'economia',l:'Economía',c:'var(--gn)'},{k:'propuesta_valor',l:'Propuesta de valor',c:'var(--ac)'},{k:'prueba_social',l:'Prueba social',c:'var(--or)'},{k:'transformacion',l:'Transformación',c:'var(--a2)'}];

function hImg(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const original=e.target.result;
    const img=new Image();
    img.onload=()=>{
      // Comprimir via canvas — max 1024px, quality 0.75
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const sc=MAX/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
      const compressed=cv.toDataURL('image/jpeg',0.75);
      S.img=compressed.split(',')[1];
      S.imgType='image/jpeg';
      const pv=document.getElementById('ipv');
      pv.src=compressed;pv.style.display='block';
      document.getElementById('iup').classList.add('has');
      document.getElementById('iuptxt').textContent='✓ Imagen cargada';
    };
    img.src=original;
  };
  r.readAsDataURL(f);
}

// ── ROBUST JSON PARSER ───────────────────────────────────────────────────
function safeParseJSON(raw) {
  // Strip markdown fences and extract JSON block
  let s = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  const fb = s.indexOf('{'), fab = s.indexOf('[');
  let st = -1;
  if (fb !== -1 && (fab === -1 || fb < fab)) st = fb;
  else if (fab !== -1) st = fab;
  if (st > 0) s = s.slice(st);
  const lb = s.lastIndexOf('}'), lab = s.lastIndexOf(']');
  const en = Math.max(lb, lab);
  if (en !== -1) s = s.slice(0, en + 1);

  // Attempt 1: direct
  try { return JSON.parse(s); } catch(_) {}

  // Attempt 2: fix unescaped double-quotes inside string values
  // Strategy: scan char by char tracking JSON string state
  try {
    let out = '';
    let inKey = false, inVal = false, esc = false, depth = 0;
    let afterColon = false;
    for (let i = 0; i < s.length; i++) {
      const c = s[i];
      if (esc) { out += c; esc = false; continue; }
      if (c === '\\') {
        if (inKey || inVal) { out += c; esc = true; }
        else out += c;
        continue;
      }
      if (!inKey && !inVal) {
        if (c === '{' || c === '[') { depth++; out += c; afterColon = false; continue; }
        if (c === '}' || c === ']') { depth--; out += c; afterColon = false; continue; }
        if (c === ':') { out += c; afterColon = true; continue; }
        if (c === ',') { out += c; afterColon = false; continue; }
        if (c === '"') {
          if (afterColon) { inVal = true; out += c; afterColon = false; }
          else { inKey = true; out += c; }
          continue;
        }
        out += c; continue;
      }
      if (inKey) {
        if (c === '"') { inKey = false; out += c; }
        else { out += c; }
        continue;
      }
      if (inVal) {
        if (c === '"') {
          // Is this closing quote? Peek ahead for , } ] or whitespace+those
          let j = i + 1;
          while (j < s.length && (s[j] === ' ' || s[j] === '\n' || s[j] === '\r' || s[j] === '\t')) j++;
          const nx = s[j];
          if (nx === ',' || nx === '}' || nx === ']' || j >= s.length) {
            inVal = false; out += c;
          } else {
            out += '\\"'; // escape internal quote
          }
        } else if (c === '\n') {
          out += '\\n'; // escape literal newlines in strings
        } else if (c === '\r') {
          out += '\\r';
        } else {
          out += c;
        }
        continue;
      }
    }
    return JSON.parse(out);
  } catch(_) {}

  // Attempt 3: nuclear — strip all quotes from values, rebuild
  try {
    const fixed = s
      .replace(/:\s*"([^"]*(?:"[^,:}\]]*)*[^"]*)"/g, (m, v) => ': "' + v.replace(/"/g, "'") + '"');
    return JSON.parse(fixed);
  } catch(_) {}

  // Attempt 4: extract with regex field by field (last resort)
  throw new Error('No se pudo parsear el JSON de la respuesta');
}

      });

    const esVarB = e._generarB === true;

function sendEd(){const b=S.brief;const dH=S.ga.map(g=>{const a=AUG.find(x=>x.k===g.ang)||{l:g.ang};const rows=g.escenas.map((s,i)=>`<div class="dr"><div class="dc" style="text-align:center;color:var(--t3)">${s.num}</div><div class="dc">${s.off}</div><div class="dc vid">${b.c}_${g.ang.toUpperCase().slice(0,3)}_00${i+1}</div><div class="dc" style="font-size:8px;color:var(--t3)">${s.dur}</div></div>`).join('');return `<div class="dw" style="margin-bottom:7px"><div class="dtop"><span class="dttl">DESGLOSE — ${a.l?.toUpperCase()}</span><span style="font-family:var(--mn);font-size:7px;color:var(--t3)">Editor completa columna video</span></div><div class="dr dh"><div class="dc">#</div><div class="dc">Línea</div><div class="dc">Video</div><div class="dc">Dur</div></div>${rows}</div>`;}).join('');
  const btnDs=S.mode==='both'?`<button class="btn bpk" onclick="gDlDs()">🎨 PDF diseñadora</button>`:'';

  aMsg('ed','Editor',`Recibido ✓ — ${S.ga.length} guion${S.ga.length>1?'es':''} para ${b.c}.`,'ed');
  const ph=S.mode==='both'?8:6;S.ph=ph;rf();
  document.getElementById('iz').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div class="izlbl" style="animation:none">✅ Listo — ${b.c}</div><button class="btn bgh" onclick="resetFlow()">+ Nuevo</button></div>`;}

  const cH=CKL.map(c=>`<div style="display:flex;gap:7px;padding:3px 0;border-bottom:1px solid #f5f5f5"><span style="color:#bbb">☐</span><span>${c}</span></div>`).join('');
  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>${b.c} — Editor</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;color:#1a1a2e;font-size:10.5px;line-height:1.6;}@page{margin:15mm 13mm;}.page{max-width:700px;margin:0 auto;padding:18px;}table{width:100%;border-collapse:collapse;}th{font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;padding:5px 8px;background:#f8f8fc;border-bottom:2px solid #eee;text-align:left;}td{padding:5px 8px;border-bottom:1px solid #f0f0f6;vertical-align:top;font-size:10.5px;}td.num{color:#aaa;font-family:monospace;font-size:9px;width:22px;text-align:center;}td.off{color:#1a1a2e;font-style:italic;font-weight:500;}td.toma{color:#555;font-size:9.5px;}td.dur{color:#7B6EF6;font-family:monospace;font-size:9px;white-space:nowrap;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.page{padding:0;}}</style></head><body><div class="page"><div style="background:#0A0A0F;color:#fff;padding:12px 16px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.03em">Forward<span style="color:#7B6EF6">.</span></div><div style="font-family:monospace;font-size:9px;color:#555568;text-align:right"><span style="color:#4ECDC4;font-weight:600">${b.c}</span> — Pedido Editor<br>${fecha}</div></div>${gH}<div style="margin:12px 0"><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid #eee">Material crudo</div><a href="${S.lm}" style="font-family:monospace;font-size:9.5px;color:#1971c2">${S.lm}</a></div><div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid #eee">Checklist pre-entrega</div>${cH}</div><div style="margin-top:14px;padding-top:9px;border-top:1px solid #eee;display:flex;justify-content:space-between"><div style="font-family:monospace;font-size:8px;color:#bbb">Generado ${fecha}</div><div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:#ccc">Forward<span style="color:#7B6EF6">.</span></div></div></div><script>window.onload=()=>window.print();<\/script></body></html>`;
  dlH(html,`${b.c}_pedido_editor_${fecha.replace(/\//g,'-')}.html`);}

function dlPDFDs(cv){const b=S.brief,fecha=new Date().toLocaleDateString('es-AR');
  const imgH=S.img?`<img src="data:${S.imgType||'image/jpeg'};base64,${S.img}" style="max-width:100px;max-height:65px;object-fit:cover;border-radius:4px;border:1px solid #eee" alt="Ref"/>`:'';
  const pH=cv.estaticas.map(e=>{const a=AST.find(x=>x.k===e.angulo)||{l:e.angulo,c:'#7B6EF6'};return `<div style="border:1px solid #e8e8f0;border-radius:9px;overflow:hidden;margin-bottom:18px;page-break-inside:avoid"><div style="background:#0A0A0F;padding:9px 14px;display:flex;justify-content:space-between;align-items:center"><span style="font-family:monospace;font-size:9px;color:${a.c};text-transform:uppercase;letter-spacing:.1em;font-weight:600">${a.l} · ${e.tipo_imagen}</span><span style="font-family:monospace;font-size:8px;color:#555568">${b.fst||'9:16'}</span></div><div style="padding:13px 15px;display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Mensaje central</div><div style="font-size:11px;color:#1a1a2e;line-height:1.6;font-style:italic;margin-bottom:11px">${e.mensaje_central}</div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Imagen</div><div style="font-size:10.5px;color:#333;line-height:1.7">${e.descripcion_imagen}</div></div><div><div style="background:#f8f8fc;border-radius:7px;padding:11px;margin-bottom:9px"><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">Textos</div><div style="font-size:17px;font-weight:700;color:#1a1a2e;line-height:1.2;margin-bottom:5px">${e.headline}</div><div style="font-size:11px;color:#555;margin-bottom:7px;line-height:1.5">${e.copy_apoyo}</div><div style="display:inline-block;background:#7B6EF6;color:#fff;font-size:10px;padding:4px 12px;border-radius:4px">${e.cta}</div></div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Paleta y tipografía</div><div style="font-size:10.5px;color:#7B6EF6;font-style:italic;line-height:1.5">${S.lk?`<a href="${S.lk}" style="color:#7B6EF6">Según manual de marca →</a>`:'Según manual de marca'}</div></div></div><div style="background:#fffdf5;border-top:1px solid #f5f0d0;padding:9px 14px"><div style="font-family:monospace;font-size:8px;color:#854F0B;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Instrucciones para la diseñadora</div><div style="font-size:10.5px;color:#333;line-height:1.7">${e.instrucciones_diseno}</div></div></div>`;}).join('');
  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>${b.c} — Diseñadora</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;color:#1a1a2e;font-size:10.5px;line-height:1.6;}@page{margin:15mm 13mm;}.page{max-width:720px;margin:0 auto;padding:18px;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.page{padding:0;}}</style></head><body><div class="page"><div style="background:#0A0A0F;color:#fff;padding:14px 18px;border-radius:9px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div><div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.03em">Forward<span style="color:#7B6EF6">.</span></div><div style="font-family:monospace;font-size:9px;color:#555568;margin-top:2px">Pedido a diseñadora — Estáticas</div></div><div style="text-align:right;font-family:monospace;font-size:9px;color:#555568;line-height:1.8"><span style="color:#4ECDC4;font-weight:600">${b.c}</span><br>${fecha} · ${cv.estaticas.length} pieza${cv.estaticas.length>1?'s':''} · ${b.fst||'9:16'}</div></div><div style="background:#f8f8fc;border-radius:7px;padding:11px 14px;margin-bottom:18px;display:grid;grid-template-columns:${imgH?'1fr 1fr 105px':'1fr 1fr'};gap:10px;align-items:start"><div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Brief</div><div style="font-size:10.5px;color:#333;line-height:1.7"><strong>Producto:</strong> ${b.p}<br><strong>Propuesta:</strong> ${b.pr}</div>${S.lk?`<div style="margin-top:7px"><a href="${S.lk}" style="font-family:monospace;font-size:9px;color:#7B6EF6;text-decoration:none">📋 Manual de marca →</a></div>`:''}</div><div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Restricciones</div><div style="font-size:10.5px;color:${b.r?'#e03131':'#888'};line-height:1.7">${b.r||'Ninguna'}</div></div>${imgH?`<div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Referencia</div>${imgH}</div>`:''}</div><div style="font-family:monospace;font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-bottom:5px;border-bottom:1px solid #eee">Piezas — ${cv.estaticas.length} estática${cv.estaticas.length>1?'s':''}</div>${pH}<div style="margin-top:18px;padding-top:10px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center"><div style="font-family:monospace;font-size:8px;color:#bbb">Generado ${fecha} · Forward Marketing</div><div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:#ccc">Forward<span style="color:#7B6EF6">.</span></div></div></div><script>window.onload=()=>window.print();<\/script></body></html>`;
  dlH(html,`${b.c}_pedido_disenadora_${fecha.replace(/\//g,'-')}.html`);aMsg('bot','Forward Bot','🎨 **PDF diseñadora descargado** — abrí en el browser e imprimí como PDF.','bot');}

function dlH(html,name){const blob=new Blob([html],{type:'text/html;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);}

function resetFlow(){S={mode:null,ph:0,brief:null,img:null,gb:null,ga:[],so:null,ss:[],sa:[],lm:null,lk:null,cv:null,chk:{}};document.getElementById('msgs').innerHTML='';document.getElementById('cbox').innerHTML='<div class="cbl">Proyecto activo</div><div class="cbv" style="color:var(--t3);font-style:italic;font-size:9.5px">Sin brief cargado</div>';document.getElementById('aprbox').style.display='none';document.getElementById('mbadge').style.display='none';rf();showMSel();aMsg('bot','Forward Bot','Nuevo proyecto. ¿Qué necesitás producir?','bot');}
