<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward — UGC Workflow v4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0F;--surface:#13131A;--surface2:#1A1A24;--surface3:#21212E;
  --border:#252535;--border2:#2E2E42;
  --accent:#7B6EF6;--accent-dim:rgba(123,110,246,.15);
  --accent2:#4ECDC4;--accent2-dim:rgba(78,205,196,.12);
  --accent3:#F7B731;--accent3-dim:rgba(247,183,49,.12);
  --danger:#FF6B6B;--danger-dim:rgba(255,107,107,.12);
  --green:#51CF66;--green-dim:rgba(81,207,102,.12);
  --pink:#F06595;--pink-dim:rgba(240,101,149,.12);
  --orange:#FF8C42;--orange-dim:rgba(255,140,66,.12);
  --text:#F2F2FA;--text2:#A0A0C0;--text3:#5A5A7A;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:16px;}
.logo{font-size:15px;font-weight:800;letter-spacing:-.03em;}
.logo span{color:var(--accent);}
.hdr-c{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;}
.pip{height:3px;width:28px;border-radius:2px;background:var(--border2);transition:all .3s;}
.pip.done{background:var(--accent2);}
.pip.active{background:var(--accent);}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:grid;grid-template-columns:220px 1fr 260px;flex:1;overflow:hidden;min-height:0;}
.sidebar{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;}
.sb-s{padding:14px 12px 6px;}
.sb-l{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.fi{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:7px;margin-bottom:2px;border:1px solid transparent;transition:all .15s;}
.fi.current{background:var(--accent-dim);border-color:rgba(123,110,246,.25);}
.fi.fdone{opacity:.4;}
.fi.pending{opacity:.2;}
.fi-ic{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.ic-p{background:var(--accent-dim);color:var(--accent);}
.ic-t{background:var(--accent2-dim);color:var(--accent2);}
.ic-a{background:var(--accent3-dim);color:var(--accent3);}
.ic-r{background:var(--danger-dim);color:var(--danger);}
.fi-t{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;}
.fi-w{font-family:var(--mono);font-size:9px;color:var(--text3);}
.fi-ck{font-size:11px;color:var(--accent2);margin-left:auto;}
.sb-div{height:1px;background:var(--border);margin:6px 12px;}
.cbox{padding:10px 12px;}
.cb-l{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;}
.cb-v{font-size:11px;color:var(--text2);line-height:1.7;}
.cb-v strong{color:var(--accent2);font-weight:600;}
.chat{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeUp .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.av-bot{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.av-ejec{background:var(--accent3-dim);color:var(--accent3);border:1px solid rgba(247,183,49,.2);}
.av-hoc{background:var(--accent2-dim);color:var(--accent2);border:1px solid rgba(78,205,196,.2);}
.av-ed{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(255,107,107,.15);}
.mb{flex:1;min-width:0;}
.mm{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;}
.mn{font-size:11px;font-weight:700;}
.mt{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:3px;}
.t-bot{background:var(--accent-dim);color:var(--accent);}
.t-ejec{background:var(--accent3-dim);color:var(--accent3);}
.t-hoc{background:var(--accent2-dim);color:var(--accent2);}
.t-ed{background:var(--danger-dim);color:var(--danger);}
.mtime{font-family:var(--mono);font-size:8px;color:var(--text3);}
.mtxt{font-size:12px;line-height:1.75;color:var(--text2);}
.mtxt strong{color:var(--text);font-weight:600;}
.mtxt em{color:var(--accent2);font-style:normal;}
.mtxt code{font-family:var(--mono);font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:1px 4px;border-radius:3px;color:var(--accent);}
.typing{display:inline-flex;gap:3px;align-items:center;padding:2px 0;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-top:6px;}
.card-h{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.fr{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start;}
.fr:last-child{margin-bottom:0;}
.fl{font-size:10px;color:var(--text3);min-width:85px;padding-top:1px;}
.fv{font-size:11px;color:var(--text);flex:1;line-height:1.5;}
.sw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:7px;overflow:hidden;}
.st{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);}
.sttl{font-family:var(--mono);font-size:9px;color:var(--accent);}
.smeta{font-family:var(--mono);font-size:8px;color:var(--text3);}
.sbody{padding:11px 13px;}
.scene{display:grid;grid-template-columns:14px 1fr;gap:4px 8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.scene:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sc-n{font-family:var(--mono);font-size:9px;color:var(--text3);padding-top:2px;text-align:right;}
.sc-o{font-size:11.5px;color:var(--text);line-height:1.6;font-style:italic;}
.sc-d{font-size:10px;color:var(--text3);margin-top:2px;}
.sc-d span{color:var(--accent3);}

/* VARIANTES MULTI-SELECT */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;cursor:pointer;transition:all .15s;position:relative;}
.vc:hover{border-color:var(--border2);background:var(--surface2);}
.vc.sel{border-color:var(--accent);background:var(--accent-dim);}
.vc.generating{border-color:var(--accent3);background:var(--accent3-dim);opacity:.7;}
.vc.done{border-color:var(--green);background:var(--green-dim);}
.vlbl{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.vhook{font-size:11px;color:var(--text);line-height:1.5;font-style:italic;}
.vfund{font-size:9.5px;color:var(--accent2);margin-top:3px;font-family:var(--mono);}
.vbadge{position:absolute;top:7px;right:7px;font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px;}
.vb-sel{background:var(--accent);color:#fff;}
.vb-done{background:var(--green);color:#fff;}
.sel-count{font-family:var(--mono);font-size:10px;color:var(--accent2);margin-top:8px;}

/* GUIONES APROBADOS */
.guiones-aprobados{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.ga-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ga-header{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);}
.ga-angulo{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;}
.ga-estado{font-family:var(--mono);font-size:8px;color:var(--text3);}

/* CORRECCIÓN */
.corrbox{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);margin-top:7px;overflow:hidden;}
.cbtop{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.cbtlbl{font-family:var(--mono);font-size:9px;color:var(--accent3);}
.cbbody{padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.cbtxt{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:11px;padding:7px 9px;border-radius:6px;outline:none;resize:none;width:100%;transition:border .15s;line-height:1.6;}
.cbtxt:focus{border-color:var(--accent3);}
.cbact{display:flex;gap:6px;justify-content:flex-end;}

/* DESGLOSE */
.dw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:7px;overflow:hidden;}
.dtop{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);}
.dttl{font-family:var(--mono);font-size:9px;color:var(--accent2);}
.dr{display:grid;grid-template-columns:18px 1fr 80px 55px;border-bottom:1px solid var(--border);}
.dr:last-child{border-bottom:none;}
.dr.dh{background:var(--surface2);font-family:var(--mono);font-size:8px;color:var(--text3);}
.dc{padding:7px 10px;font-size:10.5px;color:var(--text2);border-right:1px solid var(--border);}
.dc:last-child{border-right:none;}
.dc.vid{color:var(--accent);font-family:var(--mono);font-size:9px;}

/* HIGGSFIELD / CANVA */
.tools-section{margin-top:10px;}
.tools-tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab-btn{padding:5px 12px;border-radius:6px;font-family:var(--mono);font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text3);transition:all .15s;text-transform:uppercase;letter-spacing:.06em;}
.tab-btn.active{background:var(--accent-dim);border-color:rgba(123,110,246,.3);color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.hf-prompt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:8px;position:relative;}
.hf-scene-num{font-family:var(--mono);font-size:9px;color:var(--accent3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
.hf-text{font-size:11px;color:var(--text);line-height:1.7;}
.hf-copy{position:absolute;top:9px;right:9px;font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:4px;cursor:pointer;transition:all .15s;}
.hf-copy:hover{color:var(--text);border-color:var(--border2);}
.canva-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.canva-header{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface3);display:flex;justify-content:space-between;align-items:center;}
.canva-angulo{font-family:var(--mono);font-size:9px;color:var(--pink);text-transform:uppercase;letter-spacing:.08em;}
.canva-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px;}
.canva-field{display:flex;flex-direction:column;gap:3px;}
.canva-label{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.canva-val{font-size:11.5px;color:var(--text);line-height:1.5;}
.canva-copy{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:4px;cursor:pointer;align-self:flex-end;transition:all .15s;}
.canva-copy:hover{color:var(--text);}

/* BOTONES */
.abar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.btn{padding:5px 12px;border-radius:6px;font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:4px;}
.btn:disabled{opacity:.25;cursor:not-allowed;}
.btn-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.btn-ok:hover:not(:disabled){background:rgba(81,207,102,.2);}
.btn-rev{background:var(--accent3-dim);color:var(--accent3);border:1px solid rgba(247,183,49,.2);}
.btn-rev:hover:not(:disabled){background:rgba(247,183,49,.18);}
.btn-pr{background:var(--accent);color:#fff;}
.btn-pr:hover:not(:disabled){background:#6B5EE8;}
.btn-gh{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-gh:hover:not(:disabled){background:var(--surface3);color:var(--text);}
.btn-dl{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.btn-dl:hover:not(:disabled){background:rgba(81,207,102,.2);}
.btn-hf{background:var(--accent3-dim);color:var(--accent3);border:1px solid rgba(247,183,49,.2);}
.btn-hf:hover:not(:disabled){background:rgba(247,183,49,.18);}
.btn-cv{background:var(--pink-dim);color:var(--pink);border:1px solid rgba(240,101,149,.2);}
.btn-cv:hover:not(:disabled){background:rgba(240,101,149,.18);}

/* INPUT */
.iz{padding:10px 20px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.izlbl{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.izlbl::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
.bf{display:flex;flex-direction:column;gap:6px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.ff{display:flex;flex-direction:column;gap:2px;}
.ff label{font-family:var(--mono);font-size:8px;color:var(--text3);}
.ff input,.ff select,.ff textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:11px;padding:5px 8px;border-radius:5px;outline:none;transition:border .15s;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--accent);}
.ff textarea{resize:none;line-height:1.5;}
.ff select option{background:var(--surface2);}
.sr{display:flex;justify-content:flex-end;gap:6px;margin-top:2px;}
.lr{display:flex;gap:6px;align-items:center;}
.lr input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:5px;outline:none;}
.lr input:focus{border-color:var(--accent2);}
.wlbl{font-family:var(--mono);font-size:9px;color:var(--text3);display:flex;align-items:center;gap:4px;padding:3px 0;}

/* RIGHT */
.rpanel{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;}
.rplbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.stcard{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px;}
.str{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.str:last-child{margin-bottom:0;}
.stk{font-size:10px;color:var(--text3);}
.stv{font-size:10px;font-weight:600;}
.sv-p{color:var(--text3);}
.sv-a{color:var(--accent3);}
.sv-d{color:var(--green);}
.sv-w{color:var(--accent);}
.chi{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.chi:last-child{border-bottom:none;}
.chbox{width:13px;height:13px;border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:8px;}
.chok{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.chwt{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.chtxt{font-size:10.5px;color:var(--text2);line-height:1.4;}
.lchip{display:inline-flex;align-items:center;gap:3px;background:var(--accent2-dim);border:1px solid rgba(78,205,196,.2);color:var(--accent2);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;margin-top:4px;cursor:pointer;text-decoration:none;}
.errb{background:var(--danger-dim);border:1px solid rgba(255,107,107,.25);color:var(--danger);font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:5px;margin-top:6px;}
.vzb{display:inline-flex;align-items:center;gap:4px;background:var(--pink-dim);border:1px solid rgba(240,101,149,.2);color:var(--pink);font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Forward<span>.</span></div>
  <div class="hdr-c" id="pips"></div>
  <div class="live"><span class="dot"></span>#ugc-workflow v4</div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-s"><div class="sb-l">Flujo</div><div id="flowSteps"></div></div>
    <div class="sb-div"></div>
    <div class="cbox" id="clientBox">
      <div class="cb-l">Cliente activo</div>
      <div class="cb-v" style="color:var(--text3);font-style:italic;font-size:10px;">Sin brief cargado</div>
    </div>
    <div class="sb-div"></div>
    <div class="cbox" id="variantesAprobadas" style="display:none">
      <div class="cb-l">Guiones aprobados</div>
      <div id="variantesAprobadasList"></div>
    </div>
  </div>
  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="iz" id="iz"></div>
  </div>
  <div class="rpanel">
    <div><div class="rplbl">Estado</div><div class="stcard" id="stcard"></div></div>
    <div><div class="rplbl">Checklist editor</div><div id="chklist"></div></div>
  </div>
</div>

<script>
const PROXY='/api/anthropic-proxy';
const MODEL='claude-opus-4-5';

const PHASES=[
  {icon:'E',ic:'ic-a',title:'Brief',who:'Ejecutivo',ph:0},
  {icon:'⚡',ic:'ic-p',title:'Generación IA',who:'Bot',ph:1},
  {icon:'H',ic:'ic-t',title:'Aprobación HoC',who:'Head of Content',ph:2},
  {icon:'E',ic:'ic-a',title:'Material crudo',who:'Ejecutivo',ph:3},
  {icon:'✂',ic:'ic-r',title:'Pedido editor',who:'Editor',ph:4},
  {icon:'🎬',ic:'ic-p',title:'Estáticas',who:'Diseñadora',ph:5},
];

const CHECKLIST=['Formato 9:16 · zona segura','Subtítulos exactos con tildes','Frases clave destacadas','Hook en los primeros 2s','Sin planos +5s sin intención','Lo dicho se ve en pantalla','Sin sonido se entiende','Encuadres cuidados','Archivo: CLIENTE_###','Voz en off revisada'];

const ANGULOS=[
  {key:'emocional',label:'Emocional',color:'var(--pink)'},
  {key:'practicidad',label:'Practicidad',color:'var(--accent2)'},
  {key:'economia',label:'Economía',color:'var(--green)'},
  {key:'propuesta_valor',label:'Propuesta de valor',color:'var(--accent)'},
  {key:'prueba_social',label:'Prueba social',color:'var(--orange)'},
  {key:'transformacion',label:'Transformación',color:'var(--accent2)'},
];

const AV={bot:'⚡',ejec:'E',hoc:'H',ed:'✂'};

let S={
  phase:0,brief:null,
  guionBase:null,        // guion original con variantes
  selectedVariants:[],   // índices seleccionados

async function generateGuionBase(correctionNote=''){
  const b=S.brief;
  const FRAMEWORKS={
    'FRÍO':`Usá el framework PAS (Problema → Agitación → Solución):
1. Hook: nombrá el problema cotidiano con el que la audiencia se identifica inmediatamente
2. Agitación: profundizá en el dolor o la frustración — hacelo sentir real y específico
3. Solución: presentá el producto como la respuesta natural, no como publicidad
4. Prueba: un beneficio concreto y verificable
5. CTA: invitación a descubrir, no a comprar — tono de descubrimiento`,
    'TIBIO':`Usá el framework AIDA adaptado para audiencia tibia (Atención → Interés → Deseo → Acción):
1. Hook: recordación o familiaridad — "¿ya viste...?" / "te acordás cuando..."
2. Interés: reforzá el beneficio principal con un detalle nuevo que no conocían
3. Deseo: eliminá la objeción más común — anticipate a lo que los frena
4. Acción: CTA con urgencia suave — no presión, sino oportunidad`,
    'REMARKETING':`Usá el framework Social Proof + Scarcity para remarketing:
1. Hook: nombrá el producto directamente — ya lo vieron, no hace falta presentarlo
2. Prueba social: alguien como ellos ya lo eligió y no se arrepintió
3. Garantía o diferencial: quitá el riesgo percibido
4. Urgencia real: stock limitado, oferta por tiempo, no especulativa`,
  };
  const PERSONA_INSTRUCCION={
    'primera':'TODO el guion en primera persona. El creador habla desde su experiencia: "yo encontré", "a mí me pasó", "yo uso". Nunca dirijirse al espectador.',
    'segunda':'TODO el guion en segunda persona. Hablar directo al espectador: "vos necesitás", "te entiendo", "esto es para vos". El creador es un espejo del problema del otro.',
    'tercera':'TODO el guion en tercera persona. Hablar sobre otras personas: "muchas mujeres", "ella descubrió", "la mayoría no sabe". El creador es un observador que comparte un hallazgo.',
  };
  const prompt=`Sos un experto en copywriting de performance y producción de contenido UGC para Meta, Google y TikTok. Generás guiones que convierten aplicando frameworks de marketing validados.

BRIEF:
- Cliente: ${b.cliente}
- Producto: ${b.producto}
- Propuesta de valor: ${b.propuesta}
- Temperatura: ${b.temp}
- Duración: ${b.duracion} segundos
- Formato: ${b.formato}
- CTA: ${b.cta}
- Perfil del creador: ${b.creador||'No especificado'}
- Tono del creador: ${b.tono||'natural y cercano'}
- Persona narrativa: ${b.persona||'primera'} persona
- Voz en off: ${b.voz_ia?'IA (ElevenLabs) — texto fluido para síntesis de voz, sin pausas raras':'Grabada por el creador en rodaje'}
- Restricciones: ${b.restricciones||'Ninguna'}
${correctionNote?`- CORRECCIÓN SOLICITADA: ${correctionNote}`:''}

FRAMEWORK A APLICAR (${b.temp}):
${FRAMEWORKS[b.temp]}

INSTRUCCIÓN DE PERSONA NARRATIVA (OBLIGATORIA):
${PERSONA_INSTRUCCION[b.persona||'primera']}

REGLAS DE PRODUCCIÓN:
- Lenguaje 100% hablado y natural — cero frases publicitarias genéricas ("el mejor", "calidad premium", "no esperes más")
- Tomas máximo 5s, nunca repetir el mismo tipo de plano consecutivamente
- Cada escena debe fluir naturalmente hacia la siguiente — coherencia narrativa total
- Sin emojis en el guion
- El hook debe ser la línea más fuerte — si no detiene el scroll en 2 segundos, no sirve

Para las VARIANTES DE ÁNGULO: cada hook debe ser radicalmente diferente en ángulo emocional, vocabulario y estructura. El hook de economía nunca puede sonar al de practicidad. Hacé que la diferencia sea obvia.

Respondé SOLO con JSON válido sin texto extra ni bloques de código:
{
  "escenas": [{"num":1,"off":"texto hablado exacto","toma":"descripción precisa de la toma","dur":"Xs","nota":"instrucción de actuación o énfasis"}],
  "variantes": [
    {"angulo":"emocional","hook":"texto del hook — ángulo emocional puro, identidad o deseo","fundamento":"por qué este hook funciona para este brief específico"},
    {"angulo":"practicidad","hook":"texto del hook — ángulo funcional, beneficio concreto","fundamento":"por qué funciona"},
    {"angulo":"economia","hook":"texto del hook — ángulo económico, valor o precio justo","fundamento":"por qué funciona"},
    {"angulo":"propuesta_valor","hook":"texto del hook — diferencial único, lo que nadie más ofrece","fundamento":"por qué funciona"},
    {"angulo":"prueba_social","hook":"texto del hook — recomendación orgánica, experiencia de otro","fundamento":"por qué funciona"},
    {"angulo":"transformacion","hook":"texto del hook — antes/después, cambio visible","fundamento":"por qué funciona"}
  ],
  "nota_direccion": "3 líneas específicas: cómo debe sentirse el video, actitud y energía del creador, qué evitar absolutamente",
  "nota_voz_ia": ${b.voz_ia?'"instrucciones ElevenLabs: velocidad (ej: 0.95x), tono, dónde hacer pausas, palabras con énfasis"':'null'}
}`;

  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    let g;
    try{g=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){throw new Error('JSON inválido. Intentá de nuevo.');}
    removeTyping();S.guionBase=g;
    renderGuionBase(g,!!correctionNote);
  }catch(err){
    removeTyping();S.phase=0;refresh();
    addMsg('bot','Forward Bot','No pude generar el guion.','bot',`<div class="errb">Error: ${err.message}</div>`);
    showBriefForm();
  }
}

      <div class="cbbody">

    'bot',extra);

async function selectAndGenerateVariant(i){
  const el=document.getElementById(`vc-${i}`);if(!el)return;
  const variante=S.guionBase.variantes[i];
  const alreadyExists=S.guionesAprobados.find(g=>g.angulo===variante.angulo);
  if(alreadyExists){
    // Si ya existe, hacer scroll a ese guion en el chat
    const existingEl=document.getElementById(`guion-${variante.angulo}`);
    if(existingEl)existingEl.scrollIntoView({behavior:'smooth'});
    return;
  }

  // Marcar como generando
  el.classList.add('generating');
  const existing=el.querySelector('.vbadge');if(existing)existing.remove();
  const badge=document.createElement('div');badge.className='vbadge';badge.style.background='var(--accent3)';badge.style.color='#fff';badge.textContent='...';el.appendChild(badge);

  addTyping(`Generando — ${variante.angulo}`,'bot','bot');
  await generateGuionAngulo(variante);
  removeTyping();

  // Marcar como done
  el.classList.remove('generating');el.classList.add('done');
  const b2=el.querySelector('.vbadge');if(b2)b2.remove();
  const b3=document.createElement('div');b3.className='vbadge vb-done';b3.textContent='✓';el.appendChild(b3);

  // Render el guion recién generado
  const g=S.guionesAprobados[S.guionesAprobados.length-1];
  renderGuionAngulo(g);

  // Habilitar botón aprobar
  const btn=document.getElementById('btnAprobar');
  if(btn){btn.disabled=false;}
  renderVariantesAprobadas();
}

function renderGuionAngulo(g){
  const a=ANGULOS.find(x=>x.key===g.angulo)||{label:g.angulo,color:'var(--text2)'};
  const scenesHTML=g.escenas.map(s=>`<div class="scene"><div class="sc-n">${s.num}</div><div><div class="sc-o">"${s.off}"</div><div class="sc-d"><span>Toma:</span> ${s.toma} · <span>Dur:</span> ${s.dur}${s.nota?` · <span style="color:var(--accent)">Dir:</span> ${s.nota}`:''}</div></div></div>`).join('');

  const extra=`
    <div id="guion-${g.angulo}">
      <div class="sw" style="border-color:${a.color}40">
        <div class="st" style="background:var(--surface2)">
          <span class="sttl" style="color:${a.color}">GUION — ${a.label.toUpperCase()}</span>
          <span class="smeta">Hook: "${g.hook.slice(0,35)}${g.hook.length>35?'...':''}"</span>
        </div>
        <div class="sbody">${scenesHTML}</div>

async function submitCorrAngulo(angulo){
  const txt=document.getElementById(`corrTxt-${angulo}`)?.value.trim();
  if(!txt){alert('Describí el ajuste.');return;}
  const variante=S.guionBase.variantes.find(v=>v.angulo===angulo);
  if(!variante)return;

  // Eliminar guion anterior de este ángulo
  S.guionesAprobados=S.guionesAprobados.filter(g=>g.angulo!==angulo);
  const guionEl=document.getElementById(`guion-${angulo}`);
  if(guionEl)guionEl.closest('.msg')?.remove();

  addMsg('hoc','Head of Content',`Corrección para **${angulo}**: "${txt}"`,'hoc');

  renderGuionAngulo(g);
  renderVariantesAprobadas();

async function generateGuionAngulo(variante, correctionNote=''){
  const b=S.brief;
  const TONO_ANGULO={
    emocional:'Apelá a emociones profundas — identidad, pertenencia, deseo. Nada funcional ni racional. Todo debe resonar en el corazón, no en la cabeza.',
    practicidad:'Sé 100% funcional. Enumerar beneficios concretos, soluciones reales, pasos claros. Sin metáforas ni emoción — solo hechos útiles y directos.',
    economia:'Hablá de valor, precio justo, ahorro. El subtext es "esto vale más de lo que cuesta". Comparación implícita con lo caro o difícil de encontrar.',
    propuesta_valor:'Destacá el diferencial único — lo que ningún otro hace. Posicionamiento claro y específico. Sin generalidades ni clichés.',
    prueba_social:'Simulá una recomendación real entre personas. Testimonio vivido, comunidad, confianza. Como si le contaras a una amiga algo que descubriste.',
    transformacion:'Mostrá un antes y después claro. Arco narrativo: así era mi vida → encontré esto → así es mi vida ahora. Cambio visible y específico.',
  };
  const prompt=`Sos un experto en producción de contenido UGC para performance marketing. Generás guiones que conviertan.

BRIEF:
- Cliente: ${b.cliente}
- Producto: ${b.producto}
- Propuesta de valor: ${b.propuesta}
- Temperatura: ${b.temp}
- Duración: ${b.duracion} segundos
- Formato: ${b.formato}
- CTA: ${b.cta}
- Perfil del creador: ${b.creador||'No especificado'}
- Tono del creador: ${b.tono||'natural y cercano'}
- Voz en off: ${b.voz_ia?'IA (ElevenLabs)':'Grabada por el creador'}
- Restricciones: ${b.restricciones||'Ninguna'}

ÁNGULO: ${variante.angulo}
HOOK (primera línea exacta, no cambiar): "${variante.hook}"
ESENCIA: ${TONO_ANGULO[variante.angulo]||'Desarrollá desde el ángulo indicado.'}
${correctionNote?`\nCORRECCIÓN: ${correctionNote}`:''}

CRÍTICO: Este guion debe ser COMPLETAMENTE DIFERENTE en estructura, vocabulario y progresión a otros ángulos. El ángulo define la lógica narrativa completa — si es emocional NUNCA uses argumentos prácticos, si es economía NUNCA uses lenguaje emocional.

Respondé SOLO con JSON válido:
{"escenas":[{"num":1,"off":"${variante.hook}","toma":"toma específica para este hook","dur":"3s","nota":"cómo decirlo"},{"num":2,"off":"desarrollo coherente con ángulo ${variante.angulo}","toma":"descripción precisa","dur":"Xs","nota":"instrucción"}],"nota_direccion":"actitud específica para este ángulo, energía esperada, qué evitar absolutamente en este tono","nota_voz_ia":${b.voz_ia?'"instrucciones ElevenLabs para este tono"':'null'}}`;

  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error(`Error ${res.status}`);
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    const g=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const idx=S.guionesAprobados.findIndex(x=>x.angulo===variante.angulo);
    const entry={angulo:variante.angulo,hook:variante.hook,escenas:g.escenas,nota_direccion:g.nota_direccion,nota_voz_ia:g.nota_voz_ia};
    if(idx>=0)S.guionesAprobados[idx]=entry;
    else S.guionesAprobados.push(entry);
  }catch(err){
    const idx=S.guionesAprobados.findIndex(x=>x.angulo===variante.angulo);
    const entry={angulo:variante.angulo,hook:variante.hook,escenas:[{num:1,off:variante.hook,toma:'Error al generar',dur:'—',nota:''}],nota_direccion:'Error. Intentá corregir.',nota_voz_ia:null,error:true};
    if(idx>=0)S.guionesAprobados[idx]=entry;
    else S.guionesAprobados.push(entry);
  }
}

  const e=S.canvaLayouts?.estaticas?.[i];if(!e)return;

  navigator.clipboard.writeText(txt).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='copiar todo',1500);});
}

</style></head>

${b.creador?`<div class="brow"><span class="bk">Creador</span><span class="bv">${b.creador}</span></div>`:''}

  const w=window.open('','_blank');w.document.write(html);w.document.close();
