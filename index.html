<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward — UGC Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #13131A;
  --surface2: #1A1A24;
  --surface3: #21212E;
  --border: #252535;
  --border2: #2E2E42;
  --accent: #7B6EF6;
  --accent-dim: rgba(123,110,246,.15);
  --accent2: #4ECDC4;
  --accent2-dim: rgba(78,205,196,.12);
  --accent3: #F7B731;
  --accent3-dim: rgba(247,183,49,.12);
  --danger: #FF6B6B;
  --danger-dim: rgba(255,107,107,.12);
  --green: #51CF66;
  --green-dim: rgba(81,207,102,.12);
  --pink: #F06595;
  --pink-dim: rgba(240,101,149,.12);
  --orange: #FF8C42;
  --orange-dim: rgba(255,140,66,.12);
  --text: #F2F2FA;
  --text2: #A0A0C0;
  --text3: #5A5A7A;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:16px;}
.logo{font-size:16px;font-weight:800;letter-spacing:-.03em;white-space:nowrap;}
.logo span{color:var(--accent);}
.hdr-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;}
.phase-pip{height:3px;width:32px;border-radius:2px;background:var(--border2);transition:all .3s;}
.phase-pip.done{background:var(--accent2);}
.phase-pip.active{background:var(--accent);}
.live-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 11px;border-radius:20px;white-space:nowrap;}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr 280px;flex:1;overflow:hidden;min-height:0;}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.sb-section{padding:18px 14px 6px;}
.sb-label{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.flow-item{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:8px;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.flow-item.current{background:var(--accent-dim);border-color:rgba(123,110,246,.25);}
.flow-item.done{opacity:.45;}
.flow-item.pending{opacity:.25;}
.fi-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;}
.ic-p{background:var(--accent-dim);color:var(--accent);}
.ic-t{background:var(--accent2-dim);color:var(--accent2);}
.ic-a{background:var(--accent3-dim);color:var(--accent3);}
.ic-r{background:var(--danger-dim);color:var(--danger);}
.ic-g{background:var(--green-dim);color:var(--green);}
.fi-text{flex:1;}
.fi-title{font-size:11.5px;font-weight:600;color:var(--text);line-height:1.3;}
.fi-who{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:1px;}
.fi-done{font-size:12px;color:var(--accent2);}
.sb-divider{height:1px;background:var(--border);margin:6px 14px;}
.client-box{padding:12px 14px;}
.cb-label{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:5px;}
.cb-val{font-size:11.5px;color:var(--text2);line-height:1.7;}
.cb-val strong{color:var(--accent2);font-weight:600;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
.msg{display:flex;gap:9px;align-items:flex-start;animation:fadeUp .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.av-bot{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.av-ejec{background:var(--accent3-dim);color:var(--accent3);border:1px solid rgba(247,183,49,.2);}
.av-hoc{background:var(--accent2-dim);color:var(--accent2);border:1px solid rgba(78,205,196,.2);}
.av-ed{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(255,107,107,.15);}
.msg-body{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;}
.msg-name{font-size:12px;font-weight:700;}
.msg-tag{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;}
.tag-bot{background:var(--accent-dim);color:var(--accent);}
.tag-ejec{background:var(--accent3-dim);color:var(--accent3);}
.tag-hoc{background:var(--accent2-dim);color:var(--accent2);}
.tag-ed{background:var(--danger-dim);color:var(--danger);}
.msg-time{font-family:var(--mono);font-size:9px;color:var(--text3);}
.msg-text{font-size:13px;line-height:1.75;color:var(--text2);}
.msg-text strong{color:var(--text);font-weight:600;}
.msg-text em{color:var(--accent2);font-style:normal;}
.msg-text code{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--accent);}
.typing{display:inline-flex;gap:3px;align-items:center;padding:3px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-top:7px;}
.card-head{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.fr{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start;}
.fr:last-child{margin-bottom:0;}
.fl{font-size:10.5px;color:var(--text3);min-width:95px;padding-top:2px;}
.fv{font-size:11.5px;color:var(--text);flex:1;line-height:1.5;}

/* SCRIPT */
.script-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:8px;overflow:hidden;}
.script-top{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--surface2);}
.script-ttl{font-family:var(--mono);font-size:10px;color:var(--accent);}
.script-meta{font-family:var(--mono);font-size:9px;color:var(--text3);}
.script-body{padding:13px 15px;}
.scene{display:grid;grid-template-columns:16px 1fr;gap:5px 9px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--border);}
.scene:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sc-num{font-family:var(--mono);font-size:9px;color:var(--text3);padding-top:3px;text-align:right;}
.sc-off{font-size:12px;color:var(--text);line-height:1.65;font-style:italic;}
.sc-dir{font-size:10.5px;color:var(--text3);margin-top:3px;}
.sc-dir span{color:var(--accent3);}

/* VARIANTES */
.variantes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.var-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;cursor:pointer;transition:all .15s;position:relative;}
.var-card:hover{border-color:var(--border2);background:var(--surface2);}
.var-card.selected{border-color:var(--accent);background:var(--accent-dim);}
.var-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.var-hook{font-size:11.5px;color:var(--text);line-height:1.6;font-style:italic;}
.var-angle{font-size:10px;color:var(--accent2);margin-top:4px;font-family:var(--mono);}
.var-sel-badge{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:3px;}

/* CORRECTION */
.correction-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);margin-top:8px;overflow:hidden;}
.cb-top{padding:9px 13px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.cb-top-label{font-family:var(--mono);font-size:10px;color:var(--accent3);}
.cb-body{padding:12px 13px;display:flex;flex-direction:column;gap:8px;}
.cb-textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:12px;padding:8px 10px;border-radius:7px;outline:none;resize:none;width:100%;transition:border .15s;line-height:1.6;}
.cb-textarea:focus{border-color:var(--accent3);}
.cb-actions{display:flex;gap:7px;justify-content:flex-end;}

/* DESGLOSE */
.desglose-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:8px;overflow:hidden;}
.dsg-top{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--surface2);}
.dsg-ttl{font-family:var(--mono);font-size:10px;color:var(--accent2);}
.dsg-row{display:grid;grid-template-columns:20px 1fr 85px 65px;border-bottom:1px solid var(--border);}
.dsg-row:last-child{border-bottom:none;}
.dsg-row.dsg-head{background:var(--surface2);font-family:var(--mono);font-size:9px;color:var(--text3);}
.dc{padding:8px 11px;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.dc:last-child{border-right:none;}
.dc.vid{color:var(--accent);font-family:var(--mono);font-size:10px;}

/* ACTIONS */
.action-bar{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;}
.btn{padding:6px 13px;border-radius:6px;font-family:var(--sans);font-size:11.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn:disabled{opacity:.25;cursor:not-allowed;}
.btn-approve{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.btn-approve:hover:not(:disabled){background:rgba(81,207,102,.2);}
.btn-revise{background:var(--accent3-dim);color:var(--accent3);border:1px solid rgba(247,183,49,.2);}
.btn-revise:hover:not(:disabled){background:rgba(247,183,49,.18);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){background:#6B5EE8;}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:var(--surface3);color:var(--text);}
.btn-teal{background:var(--accent2-dim);color:var(--accent2);border:1px solid rgba(78,205,196,.2);}
.btn-teal:hover:not(:disabled){background:rgba(78,205,196,.18);}
.btn-download{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.btn-download:hover:not(:disabled){background:rgba(81,207,102,.2);}

/* INPUT ZONE */
.input-zone{padding:12px 24px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.iz-label{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.iz-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
.brief-form{display:flex;flex-direction:column;gap:7px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-family:var(--mono);font-size:9px;color:var(--text3);}
.ff input,.ff select,.ff textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:11.5px;padding:6px 9px;border-radius:6px;outline:none;transition:border .15s;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--accent);}
.ff textarea{resize:none;line-height:1.6;}
.ff select option{background:var(--surface2);}
.send-row{display:flex;justify-content:flex-end;gap:7px;margin-top:3px;}
.link-row{display:flex;gap:7px;align-items:center;}
.link-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);font-family:var(--mono);font-size:11px;padding:6px 9px;border-radius:6px;outline:none;}
.link-row input:focus{border-color:var(--accent2);}
.wait-label{font-family:var(--mono);font-size:9px;color:var(--text3);display:flex;align-items:center;gap:5px;padding:4px 0;}

/* RIGHT PANEL */
.rpanel{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:14px;}
.rp-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.status-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px;}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sr:last-child{margin-bottom:0;}
.sk{font-size:10.5px;color:var(--text3);}
.sv{font-size:10.5px;font-weight:600;}
.sv-p{color:var(--text3);}
.sv-a{color:var(--accent3);}
.sv-d{color:var(--green);}
.sv-w{color:var(--accent);}
.chk-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.chk-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(81,207,102,.25);}
.chk-wait{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.chk-txt{color:var(--text2);line-height:1.4;}

/* LINK CHIP */
.link-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent2-dim);border:1px solid rgba(78,205,196,.2);color:var(--accent2);font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;margin-top:5px;cursor:pointer;text-decoration:none;}

/* ERROR */
.err-band{background:var(--danger-dim);border:1px solid rgba(255,107,107,.25);color:var(--danger);font-family:var(--mono);font-size:10.5px;padding:7px 11px;border-radius:6px;margin-top:7px;}

/* VOZ IA badge */
.voz-badge{display:inline-flex;align-items:center;gap:5px;background:var(--pink-dim);border:1px solid rgba(240,101,149,.2);color:var(--pink);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;}

/* SCROLLBARS */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Forward<span>.</span></div>
  <div class="hdr-center" id="phasePips"></div>
  <div class="live-badge"><span class="dot-live"></span>#ugc-workflow</div>
</div>

<div class="layout">

  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Flujo</div>
      <div id="flowSteps"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="client-box" id="clientBox">
      <div class="cb-label">Cliente activo</div>
      <div class="cb-val" style="color:var(--text3);font-style:italic;font-size:11px;">Sin brief cargado</div>
    </div>
  </div>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-zone" id="inputZone"></div>
  </div>

  <div class="rpanel">
    <div>
      <div class="rp-label">Estado</div>
      <div class="status-card" id="statusCard"></div>
    </div>
    <div>
      <div class="rp-label">Checklist editor</div>
      <div id="checklist"></div>
    </div>
  </div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const PROXY = '/api/anthropic-proxy';
const MODEL = 'claude-opus-4-5';

// ─── STATE ────────────────────────────────────────────────────────────────
let S = {
  phase: 0,
  brief: null,
  guion: null,         // { escenas, hookPrincipal, variantes[], nota_direccion, restricciones_aplicadas }
  selectedVariant: null,
  linkMaterial: null,
};

const PHASES = [
  { icon:'E', ic:'ic-a', title:'Brief',           who:'Ejecutivo',       ph:0 },
  { icon:'⚡', ic:'ic-p', title:'Generación IA',   who:'Bot',             ph:1 },
  { icon:'H', ic:'ic-t', title:'Aprobación HoC',  who:'Head of Content', ph:2 },
  { icon:'E', ic:'ic-a', title:'Material crudo',  who:'Ejecutivo',       ph:3 },
  { icon:'✂', ic:'ic-r', title:'Pedido editor',   who:'Editor',          ph:4 },
];

const CHECKLIST = [
  'Formato 9:16 · info en zona segura',
  'Subtítulos exactos con tildes',
  'Frases clave destacadas visualmente',
  'Hook arranca en los primeros 2s',
  'Sin planos +5s sin intención',
  'Lo que se dice se ve en pantalla',
  'Sin sonido el video se entiende',
  'Encuadres cuidados · sin ruido visual',
  'Archivo: CLIENTE_###',
  'Voz en off revisada (si aplica)',
];

const ANGULOS = [
  { key:'emocional',       label:'Emocional',         color:'var(--pink)',   desc:'Conexión, deseo, identidad' },
  { key:'practicidad',     label:'Practicidad',        color:'var(--accent2)',desc:'Solución, facilidad, rapidez' },
  { key:'economia',        label:'Economía',           color:'var(--green)',  desc:'Precio, valor, ahorro' },
  { key:'propuesta_valor', label:'Propuesta de valor', color:'var(--accent)', desc:'Diferencial, por qué elegirlo' },
  { key:'competencia',     label:'Vs competencia',     color:'var(--accent3)',desc:'Comparación implícita o directa' },
  { key:'prueba_social',   label:'Prueba social',      color:'var(--orange)', desc:'Reviews, comunidad, confianza' },
  { key:'escasez',         label:'Urgencia / escasez', color:'var(--danger)', desc:'Límite de tiempo o stock' },
  { key:'transformacion',  label:'Transformación',     color:'var(--accent2)',desc:'Antes/después, resultado visible' },
];

// ─── INIT ─────────────────────────────────────────────────────────────────
function init() {
  renderPips(); renderSidebar(); renderStatus(); renderChecklist();
  showBriefForm();
  addMsg('bot','Forward Bot','¡Hola! Completá el brief y genero el guion completo con variantes de ángulo para que elijas la mejor versión.','tag-bot','av-bot');
}

// ─── SIDEBAR / STATUS ─────────────────────────────────────────────────────
function renderPips() {
  document.getElementById('phasePips').innerHTML = PHASES.map((_,i)=>{
    let c=''; if(i<S.phase)c='done'; else if(i===S.phase)c='active';
    return `<div class="phase-pip ${c}"></div>`;
  }).join('');
}
function renderSidebar() {
  document.getElementById('flowSteps').innerHTML = PHASES.map((p,i)=>{
    let cls='pending'; let chk='';
    if(i===S.phase)cls='current';
    else if(i<S.phase){cls='done';chk='<span class="fi-done">✓</span>';}
    return `<div class="flow-item ${cls}">
      <div class="fi-icon ${p.ic}">${p.icon}</div>
      <div class="fi-text"><div class="fi-title">${p.title}</div><div class="fi-who">${p.who}</div></div>
      ${chk}
    </div>`;
  }).join('');
}
function renderClientBox() {
  if(!S.brief)return;
  const b=S.brief;
  document.getElementById('clientBox').innerHTML=`
    <div class="cb-label">Cliente activo</div>
    <div class="cb-val"><strong>${b.cliente}</strong><br>${b.producto}<br>${b.temp} · ${b.duracion}s · ${b.formato}${b.voz_ia?'<br><span class="voz-badge">🎙 Voz IA</span>':''}</div>`;
}
function renderStatus() {
  const rows=[
    ['Brief',         S.phase>=1?['sv-d','✓']  :['sv-a','En curso']],
    ['Guion IA',      S.phase>=2?['sv-d','✓']  :S.phase>=1?['sv-a','Generando...']:['sv-p','—']],
    ['Aprobación HoC',S.phase>=3?['sv-d','✓']  :S.phase>=2?['sv-w','Esperando']:['sv-p','—']],

const AV_LETTERS={'av-bot':'⚡','av-ejec':'E','av-hoc':'H','av-ed':'✂'};
function addMsg(type,name,text,tagCls,avCls,extra='') {
  const el=document.getElementById('messages');
  const t=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg';
  d.innerHTML=`
    <div class="av ${avCls}">${AV_LETTERS[avCls]||'?'}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name">${name}</span>
        <span class="msg-tag ${tagCls}">${tagCls.replace('tag-','')}</span>
        <span class="msg-time">${t}</span>
      </div>
      <div class="msg-text">${fmt(text)}</div>
      ${extra}
    </div>`;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
  return d;
}
function fmt(t){
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/_(.*?)_/g,'<em>$1</em>')
          .replace(/`(.*?)`/g,'<code>$1</code>')
          .replace(/\n/g,'<br>');
}
function addTyping(name,avCls,tagCls){
  const el=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg';d.id='typing';
  d.innerHTML=`<div class="av ${avCls}">${AV_LETTERS[avCls]}</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-name">${name}</span><span class="msg-tag ${tagCls}">${tagCls.replace('tag-','')}</span></div>
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  el.appendChild(d); el.scrollTop=el.scrollHeight;
}
function removeTyping(){const e=document.getElementById('typing');if(e)e.remove();}

// ─── GUION IA ─────────────────────────────────────────────────────────────
async function generateGuion(correctionNote=''){
  const b=S.brief;
  const estructuras={
    'FRÍO':        'Hook con problema cotidiano o deseo latente → presentación orgánica del producto → beneficio funcional concreto → diferencial frente a lo genérico → CTA de descubrimiento.',
    'TIBIO':       'Hook de recordación o familiaridad → refuerzo del beneficio principal → eliminación de la objeción más común → CTA con urgencia suave.',
    'REMARKETING': 'Hook directo al producto (ya lo viste) → propuesta concreta y reforzada → prueba social o garantía → CTA con urgencia real o escasez.',
  };
  const prompt=`Sos un experto en producción de contenido UGC para performance marketing en Meta, Google y TikTok.
Tu objetivo es generar guiones que conviertan, con lenguaje 100% natural y hablado, cero publicitario.

BRIEF:
- Cliente: ${b.cliente}
- Producto a comunicar: ${b.producto}
- Propuesta de valor: ${b.propuesta}
- Temperatura: ${b.temp}
- Duración: ${b.duracion} segundos
- Formato: ${b.formato}
- CTA: ${b.cta}
- Perfil del creador: ${b.creador||'No especificado'}
- Voz en off: ${b.voz_ia?'Generada con IA (ElevenLabs) — el texto debe ser fluido para síntesis de voz, sin pausas raras':'Grabada por el creador en rodaje'}
- Restricciones (NO mencionar ni mostrar): ${b.restricciones||'Ninguna'}
${correctionNote?`- CORRECCIÓN SOLICITADA: ${correctionNote}`:''}

ESTRUCTURA SEGÚN TEMPERATURA ${b.temp}:
${estructuras[b.temp]}

REGLAS:
- Lenguaje natural hablado, primera persona o segunda persona directa según contexto
- Cero frases publicitarias genéricas ("el mejor", "calidad premium", etc.)
- Tomas máximo 5 segundos, sin repetir el mismo tipo de plano
- El texto hablado debe poder pronunciarse en la duración estimada de cada escena
- Pensado para performance Meta: hook fuerte, ritmo ágil, CTA claro
- Sin emojis en el guion

Respondé SOLO con JSON válido, sin texto extra ni bloques de código:

{
  "escenas": [
    {
      "num": 1,
      "off": "texto hablado exacto que dice el creador",
      "toma": "descripción precisa de la toma y acción visual",
      "dur": "Xs",
      "nota": "instrucción de actuación o énfasis para esa escena"
    }
  ],
  "variantes": [
    {
      "angulo": "emocional",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    },
    {
      "angulo": "practicidad",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    },
    {
      "angulo": "economia",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    },
    {
      "angulo": "propuesta_valor",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    },
    {
      "angulo": "prueba_social",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    },
    {
      "angulo": "transformacion",
      "hook": "texto del hook alternativo",
      "fundamento": "por qué este ángulo funciona para este brief"
    }
  ],
  "nota_direccion": "3 líneas para el creador: cómo debe sentirse el video, actitud y energía esperada, qué evitar absolutamente",
  "nota_voz_ia": ${b.voz_ia?'"instrucciones específicas para configurar ElevenLabs: velocidad, tono, pausas, énfasis"':'null'}
}`;

  try {
    const res=await fetch(PROXY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:2000,messages:[{role:'user',content:prompt}]}),
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const data=await res.json();
    const raw=data.content?.[0]?.text||'';
    let g;
    try{g=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){throw new Error('Respuesta no parseable. Intentá de nuevo.');}
    removeTyping();
    S.guion=g;
    renderGuion(g);
  } catch(err){
    removeTyping();
    S.phase=0;refresh();
    addMsg('bot','Forward Bot','No pude generar el guion.','tag-bot','av-bot',
      `<div class="err-band">Error: ${err.message}</div>`);
    showBriefForm();
  }
}

function selectVariant(i){
  document.querySelectorAll('.var-card').forEach(c=>c.classList.remove('selected'));

    el.innerHTML+=`<div class="var-sel-badge">Seleccionado</div>`;
  }
  S.selectedVariant=S.guion.variantes[i];
}

function toggleCorrection(){
  const box=document.getElementById('correctionBox');

}

function submitCorrection(){
  const txt=document.getElementById('correctionText')?.value.trim();

  document.getElementById('approvalBar')?.remove();
  document.getElementById('correctionBox')?.remove();
  addMsg('hoc','Head of Content',`Corrección solicitada: "${txt}"`, 'tag-hoc','av-hoc');
  showWait('⚡ Aplicando corrección...');

  const hookFinal=S.selectedVariant?S.selectedVariant.hook:g.escenas[0].off;
  const anguloFinal=S.selectedVariant?S.selectedVariant.angulo:'base';
  const fecha=new Date().toLocaleDateString('es-AR');

  const scenesRows=g.escenas.map(s=>`
    <tr>
      <td class="num">${s.num}</td>
      <td class="off">"${s.off}"</td>
      <td class="toma">${s.toma}</td>
      <td class="dur">${s.dur}</td>
    </tr>
    ${s.nota?`<tr><td></td><td colspan="3" class="dir-note">Dir: ${s.nota}</td></tr>`:''}`).join('');

  const desgloseRows=g.escenas.map((s,i)=>`
    <tr>
      <td class="num">${s.num}</td>
      <td>${s.off}</td>
      <td class="vid">${b.cliente}_00${i+1}</td>
      <td class="dur">${s.dur}</td>
    </tr>`).join('');

  const checklistItems=CHECKLIST.map(c=>`<div class="chk-row"><span class="chk-sq">☐</span><span>${c}</span></div>`).join('');

  const variantesSection=g.variantes.map(v=>{
    const a=ANGULOS.find(x=>x.key===v.angulo)||{label:v.angulo,color:'#7A7A9A'};
    const isSelected=S.selectedVariant&&S.selectedVariant.angulo===v.angulo;
    return `<div class="var-row ${isSelected?'var-selected':''}">
      <div class="var-angle-label" style="color:${a.color}">${a.label}${isSelected?' ✓ APROBADO':''}</div>
      <div class="var-hook-text">"${v.hook}"</div>
      <div class="var-fund">${v.fundamento}</div>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>${b.cliente} — Pedido UGC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:#fff;color:#1a1a2e;font-size:11px;line-height:1.6;}
  @page{margin:18mm 16mm;}
  .page{max-width:720px;margin:0 auto;padding:24px;}
  
  .hdr-band{background:#0A0A0F;color:#fff;padding:18px 22px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .hdr-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.03em;}
  .hdr-logo span{color:#7B6EF6;}
  .hdr-meta{font-family:'DM Mono',monospace;font-size:10px;color:#555568;text-align:right;line-height:1.8;}
  .hdr-meta strong{color:#4ECDC4;}

  .section{margin-bottom:20px;}
  .section-title{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #eee;}
  
  .brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;}
  .brief-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid #f5f5f5;}
  .brief-row:last-child{border-bottom:none;}
  .bk{font-size:10px;color:#888;min-width:90px;}
  .bv{font-size:11px;color:#1a1a2e;font-weight:500;}
  .restrict-val{color:#e03131;}
  .voz-ia{background:#fdf2f8;color:#c2255c;padding:1px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;}

  table{width:100%;border-collapse:collapse;}
  th{font-family:'DM Mono',monospace;font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;padding:7px 10px;background:#f8f8fc;border-bottom:2px solid #eee;text-align:left;}
  td{padding:8px 10px;border-bottom:1px solid #f0f0f6;vertical-align:top;font-size:11px;}
  td.num{color:#aaa;font-family:'DM Mono',monospace;font-size:10px;width:24px;text-align:center;}
  td.off{color:#1a1a2e;font-style:italic;font-weight:500;}
  td.toma{color:#555;font-size:10.5px;}
  td.dur{color:#7B6EF6;font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;}
  td.vid{color:#7B6EF6;font-family:'DM Mono',monospace;font-size:10px;}
  td.dir-note{color:#F7B731;font-size:10px;padding-top:0;padding-bottom:8px;background:#fffdf5;}
  
  .hook-box{background:#f3f0ff;border:1px solid #c5b9f8;border-radius:8px;padding:12px 15px;margin-bottom:8px;}
  .hook-angulo{font-family:'DM Mono',monospace;font-size:9px;color:#7B6EF6;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
  .hook-text{font-size:13px;font-style:italic;color:#1a1a2e;font-weight:500;line-height:1.5;}

  .nota-box{background:#f8fbff;border:1px solid #d0e4ff;border-radius:8px;padding:12px 15px;font-size:11.5px;color:#333;line-height:1.7;}
  
  .var-row{padding:10px 12px;border:1px solid #eee;border-radius:7px;margin-bottom:7px;}
  .var-row.var-selected{border-color:#7B6EF6;background:#f8f6ff;}
  .var-angle-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
  .var-hook-text{font-size:12px;font-style:italic;color:#1a1a2e;font-weight:500;margin-bottom:3px;}
  .var-fund{font-size:10px;color:#888;line-height:1.5;}

  .el-box{background:#fdf2f8;border:1px solid #f9c0d8;border-radius:8px;padding:12px 15px;font-size:11px;color:#333;line-height:1.7;}
  .el-title{font-family:'DM Mono',monospace;font-size:9px;color:#c2255c;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}

  .chk-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start;}
  .chk-row:last-child{border-bottom:none;}
  .chk-sq{color:#bbb;font-size:13px;line-height:1;flex-shrink:0;}
  
  .footer{margin-top:24px;padding-top:12px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
  .footer-left{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;}

  .footer-right span{color:#7B6EF6;}

  .drive-link{font-family:'DM Mono',monospace;font-size:10px;color:#1971c2;word-break:break-all;}

  @media print{
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .no-print{display:none;}
    .page{padding:0;}
  }
</style>
</head>
<body>
<div class="page">

  <div class="hdr-band">
    <div class="hdr-logo">Forward<span>.</span></div>
    <div class="hdr-meta">
      <strong>${b.cliente}</strong> — Pedido UGC<br>
      ${fecha} · ${b.duracion}s · ${b.formato} · ${b.temp}

  </div>

  <div class="section">
    <div class="section-title">Brief</div>
    <div class="brief-grid">
      <div>
        <div class="brief-row"><span class="bk">Cliente</span><span class="bv">${b.cliente}</span></div>

        ${b.restricciones?`<div class="brief-row"><span class="bk">Restricciones</span><span class="bv restrict-val">${b.restricciones}</span></div>`:''}

  </div>

  <div class="section">
    <div class="section-title">Hook aprobado</div>
    <div class="hook-box">
      <div class="hook-angulo">Ángulo: ${anguloFinal}</div>
      <div class="hook-text">"${hookFinal}"</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Guion aprobado</div>
    <table>
      <tr><th>#</th><th>Texto hablado</th><th>Toma</th><th>Dur</th></tr>
      ${scenesRows}
    </table>
  </div>

  <div class="section">
    <div class="section-title">Nota de dirección</div>
    <div class="nota-box">${g.nota_direccion}</div>
  </div>

  ${g.nota_voz_ia?`
  <div class="section">
    <div class="section-title">Configuración ElevenLabs</div>
    <div class="el-box">${g.nota_voz_ia}</div>
  </div>`:''}

  <div class="section">

    ${variantesSection}
  </div>

  <div class="section">

      <tr><th>#</th><th>Línea del guion</th><th>Video asignado</th><th>Duración</th></tr>
      ${desgloseRows}
    </table>
  </div>

  <div class="section">
    <div class="section-title">Material crudo</div>
    <a class="drive-link" href="${S.linkMaterial}">${S.linkMaterial}</a>
  </div>

  <div class="section">
    <div class="section-title">Checklist pre-entrega</div>
    ${checklistItems}
  </div>

  <div class="footer">
    <div class="footer-left">Generado ${fecha} · forward-guiones.netlify.app</div>
    <div class="footer-right">Forward<span>.</span></div>
  </div>

</div>
<script>window.onload=()=>window.print();<\/script>
</body>
</html>`;

  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

// ─── RESET ────────────────────────────────────────────────────────────────
function resetFlow(){
  S={phase:0,brief:null,guion:null,selectedVariant:null,linkMaterial:null,checklistState:{}};
  document.getElementById('messages').innerHTML='';
  document.getElementById('clientBox').innerHTML='<div class="cb-label">Cliente activo</div><div class="cb-val" style="color:var(--text3);font-style:italic;font-size:11px;">Sin brief cargado</div>';
  refresh();showBriefForm();
  addMsg('bot','Forward Bot','Nuevo pedido listo. Completá el brief para arrancar.','tag-bot','av-bot');
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
